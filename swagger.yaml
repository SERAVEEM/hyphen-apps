openapi: 3.0.0
info:
  title: "HYPEN API Docs"
  description: "Dokumentasi API untuk HYPEN, mencakup otentikasi dan manajemen pengguna."
  version: "1.0.0"

tags:
  - name: Auth
    description: "API untuk otentikasi (Register, Login, Logout, dll)"
  - name: User
    description: "API untuk pembaruan data dan profil"

paths:
  # --- DOMAIN AUTH ---
  /api/v1/auth/register:
    post:
      tags:
        - Auth 
      summary: "Mendaftarkan pengguna baru"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                email:
                  type: string
                password:
                  type: string
      responses:
        '201':
          description: "Pengguna berhasil didaftarkan"
        '400':
          description: "Permintaan tidak valid"
        '500':
          description: "Kesalahan server"
  /api/v1/auth/resendOTP:
    post:
      tags:
        - Auth
      summary: "Mengirim ulang OTP untuk verifikasi email"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
      responses:
        '200':
          description: "OTP berhasil dikirim ulang"
        '400':
          description: "Permintaan tidak valid"
        '500':
          description: "Kesalahan server"
  /api/v1/auth/login:
    post: 
      tags:
        - Auth
      summary: "Melakukan login pengguna"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: "Login berhasil"
        '400':
          description: "Permintaan tidak valid"
        '401':
          description: "Email atau kata sandi salah"
          '500':
          description: "Kesalahan server" 
  /api/v1/auth/refresh-token:
    post:
      tags:
        - Auth
      summary: "Mendapatkan access token baru menggunakan refresh token"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: "Access token berhasil diperbarui"
        '400':
          description: "Permintaan tidak valid"
        '401':
          description: "Refresh token tidak valid atau sudah kedaluwarsa"
        '500':
          description: "Kesalahan server"
  /api/v1/auth/logout:
    post:
      tags:
        - Auth
      summary: "Melakukan logout pengguna"
      responses:
        '200':
          description: "Logout berhasil"      
          '500':  
          description: "Kesalahan server"
  /api/v1/auth/forgot-password:
    post:
      tags:
        - Auth
      summary: "Meminta reset password"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
      responses:
        '200':
          description: "Permintaan reset password berhasil"
        '400':
          description: "Permintaan tidak valid"
        '500':
          description: "Kesalahan server"
  /api/v1/auth/reset-password:
    post:
      tags:
        - Auth
      summary: "Mengatur ulang kata sandi"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
                newPassword:
                  type: string
      responses:
        '200':
          description: "Mengatur ulang kata sandi berhasil"
        '400':
          description: "Permintaan tidak valid"
        '401':
          description: "Token reset password tidak valid atau sudah kedaluwarsa"
        '500':
          description: "Kesalahan server"
  /api/v1/auth/verify-email:
    post:
      tags:
        - Auth
      summary: "Memverifikasi email pengguna"
      requestBody:  
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
      responses:
        '200':
          description: "Email berhasil diverifikasi"
        '400':
          description: "Permintaan tidak valid"
        '401':
          description: "Token verifikasi email tidak valid atau sudah kedaluwarsa"
        '500':
          description: "Kesalahan server"


  # --- DOMAIN USER ---
  /api/v1/user/profile:
    get:
      tags:
        - User
      summary: "Mengambil profil pengguna"
      responses:
        '200':
          description: "Profil pengguna berhasil diambil"
        '400':
          description: "Permintaan tidak valid"
        '401':
          description: "Akses ditolak"
        '500':
          description: "Kesalahan server"

  /api/v1/user/update:
    put:
      tags:
        - User
      summary: "Memperbarui data pengguna"
      responses:
        '200':
          description: "Data berhasil diupdate"
        '400':
          description: "Permintaan tidak valid"
        '401':
          description: "Akses ditolak"
        '500':
          description: "Kesalahan server" 

  /api/v1/user/change-password:
    put:
      tags:
        - User
      summary: "Mengubah kata sandi pengguna"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
      responses:
        '200':
          description: "Kata sandi berhasil diubah"
        '400':
          description: "Permintaan tidak valid"
        '401':
          description: "Akses ditolak atau kata sandi saat ini salah"
        '500':
          description: "Kesalahan server"
  /api/v1/user/wishlist:
    get:
      tags:
        - User
      summary: "Mengambil wishlist pengguna"
      responses:
        '200':
          description: "Wishlist berhasil diambil"
        '400':
          description: "Permintaan tidak valid"
        '401':
          description: "Akses ditolak"
        '500':
          description: "Kesalahan server"
  /api/v1/user/add-wishlist:
    post:
      tags:
        - User
      summary: "Menambahkan produk ke wishlist"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                productId:
                  type: string
      responses:
        '200':
          description: "Produk berhasil ditambahkan ke wishlist"
        '400':
          description: "Permintaan tidak valid"
        '401':
          description: "Akses ditolak"
        '500':
          description: "Kesalahan server"
  /api/v1/user/remove-wishlist:
    delete:
      tags:
        - User
      summary: "Menghapus produk dari wishlist"
      responses:
        '200':
          description: "Produk berhasil dihapus dari wishlist"
        '400':
          description: "Permintaan tidak valid"
        '401':
          description: "Akses ditolak"
        '500':
          description: "Kesalahan server"

  /api/v1/user/delete:
    delete: 
      tags:
        - User
      summary: "Menghapus pengguna"
      responses:
        '200':
          description: "Pengguna berhasil dihapus"
        '400':
          description: "Permintaan tidak valid"
        '401':
          description: "Akses ditolak"
        '500':
          description: "Kesalahan server"   

  # --- DOMAIN PRODUCT ---
  /api/v1/product/create:
    post:
      tags:
        - Product
      summary: "Membuat produk baru"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                price:
                  type: number
                stock:
                  type: integer
      responses:
        '201':
          description: "Produk berhasil dibuat"
        '400':
          description: "Permintaan tidak valid" 
        '401':
          description: "Akses ditolak"
        '500':
          description: "Kesalahan server" 
  /api/v1/product/update:
    put:
      tags:
        - Product
      summary: "Memperbarui data produk"
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            description: "ID produk"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type  : object
              properties:
                name:
                  type: string
                description:    
              type: string  
                price:
                  type: number
                stock:
                  type: integer 
      responses:
        '200':
          description: "Produk berhasil diperbarui" 
        '400':
          description: "Permintaan tidak valid"
        '401':
          description: "Akses ditolak"
        '500':
          description: "Kesalahan server"
  /api/v1/product/get-all:
    get:
      tags:
        - Product
      summary: "Mengambil semua produk/ search product"
      parameters:
        - in: query
          name: search
          schema:
            type: string
            description: "Kata kunci pencarian"
      responses:
        '200':
          description: "Semua produk berhasil diambil"
        '400':
          description: "Permintaan tidak valid"
        '401':
          description: "Akses ditolak"
        '500':
          description: "Kesalahan server"
  /api/v1/product/get-id:
    get:
      tags:
        - Product
      summary: "Mengambil detail produk" 
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            description: "ID produk"
      responses:
        '200':
          description: "Detail produk berhasil diambil"
        '400':
          description: "Permintaan tidak valid"
        '401':
          description: "Akses ditolak"
        '500':
          description: "Kesalahan server"
  /api/v1/product/delete:
    delete:
      tags:
        - Product 
      summary: "Menghapus produk"
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            description: "ID produk"
      responses:
        '200':
          description: "Produk berhasil dihapus"
        '400':
          description: "Permintaan tidak valid"
        '401':
          description: "Akses ditolak"
        '500':
          description: "Kesalahan server"
  

  # --- DOMAIN ORDER ---
  /api/v1/order/create-order:
    post:
      tags:
        - Order
      summary: "User membuat pesanan baru"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                products:
                  type: array
                  items:
                    type: object
                    properties:
                      productId:
                        type: string
                      quantity:
                        type: integer
                totalPrice:
                  type: number
      responses:
        '201':
          description: "Pesanan berhasil dibuat"
        '400':
          description: "Permintaan tidak valid"
        '401':
          description: "Akses ditolak"
        '500':
          description: "Kesalahan server"
  /api/v1/order/all-orders:
    get:
      tags:
        - Order
      summary: "Admin cek semua pesanan yang dibuat"
      responses:
        '200':
          description: "Semua pesanan berhasil diambil"
        '400':
          description: "Permintaan tidak valid"
        '401':
          description: "Akses ditolak"
        '500':
          description: "Kesalahan server"
  /api/v1/order/orders/:id:
    get:
      tags:
        - Order
      summary: "pengecekan detail pesanan"
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            description: "ID pesanan"
      responses:
        '200':
          description: "Detail pesanan berhasil diambil"
        '400':
          description: "Permintaan tidak valid"
        '401':
          description: "Akses ditolak"
        '500':
          description: "Kesalahan server"
  /api/v1/order/my-orders:
    get:
      tags:
        - Order
      summary: "User cek riwayat pesanan yang pernah dibuat"
      responses:
        '200':
          description: "Pesanan pengguna berhasil diambil"
        '400':
          description: "Permintaan tidak valid"
        '401':
          description: "Akses ditolak"
        '500':
          description: "Kesalahan server"
  /api/v1/order/cancel-order:
    post:
      tags:
        - Order
      summary: "User membatalkan pesanan"
      responses:
        '200':
          description: "Pesanan berhasil dibatalkan"
        '400':
          description: "Permintaan tidak valid"
        '401':
          description: "Akses ditolak"
        '500':
          description: "Kesalahan server"




  # --- DOMAIN PAYMENT ---
  /api/v1/payment/create-payment:
    post:
      tags:
        - Payment
      summary: "User membuat pembayaran"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                orderId:
                  type: string
                totalPrice:
                  type: number
      responses:
        '201':
          description: "Pembayaran berhasil dibuat"
        '400':
          description: "Permintaan tidak valid"
        '401':
          description: "Akses ditolak"
        '500':
          description: "Kesalahan server"

  /api/v1/payment/all-payments:
    get:
      tags:
        - Payment
      summary: "Admin cek semua riwayat pembayaran"
      responses:
        '200':
          description: "Semua pembayaran berhasil diambil"
        '400':
          description: "Permintaan tidak valid"
        '401':
          description: "Akses ditolak"
        '500':
          description: "Kesalahan server"
  /api/v1/payment/pay/:id:
    get:
      tags:
        - Payment
      summary: "Admin mengecek detail pembayaran"
      responses:
        '200':
          description: "Berhasil mengecek detail pembayaran"
        '400':
          description: "Permintaan tidak valid"
        '401':
          description: "Akses ditolak"
        '500':
          description: "Kesalahan server"
  /api/v1/payment//my-payments:
    get:
      tags:
        - Payment
      summary: "User cek riwayat pembayaran yang pernah dibuat"
      responses:
        '200':
          description: "Pembayaran pengguna berhasil diambil"
        '400':
          description: "Permintaan tidak valid"
        '401':
          description: "Akses ditolak"
        '500':
          description: "Kesalahan server"
  /api/v1/payment/cancel-payment:
    post:
      tags:
        - Payment
      summary: "User membatalkan pembayaran sekaligus dengan order nya"
      responses:
        '200':
          description: "Pembayaran berhasil dibatalkan"
        '400':
          description: "Permintaan tidak valid"
        '401':
          description: "Akses ditolak"
        '500':
          description: "Kesalahan server"




